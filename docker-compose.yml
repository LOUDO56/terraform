name: s3platform

services:
  minio-hot:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-hot-data:/data
    restart: unless-stopped

  minio-cold:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-cold-data:/data
    restart: unless-stopped

  nextjs:
    build:
      context: ./nextjs
    env_file:
      - .env
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "3000"
    depends_on:
      - minio-hot
      - minio-cold
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nextjs
    restart: unless-stopped

volumes:
  minio-hot-data:
  minio-cold-data:
  caddy-data:
  caddy-config:
